<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking Portal · Huacheng Elite</title>
  <meta name="description" content="Huacheng Elite (华承精锐) booking portal — browse the weekly Wushu schedule, book classes and manage credits. UX concept demo." />
  <meta name="theme-color" content="#f7f5ef" />
  <meta name="robots" content="noindex" />

  <!-- Favicon (inline hexagon mark — matches the main site) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 112'%3E%3Cg fill='none' stroke='%23242926' stroke-width='5' stroke-linejoin='round'%3E%3Cpolygon points='50,4 91,28 91,84 50,108 9,84 9,28'/%3E%3Cpath d='M30 42 L50 54 L70 42 M30 58 L50 70 L70 58 M50 22 L50 90'/%3E%3C/g%3E%3C/svg%3E" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="app.css" />
</head>
<body data-page="portal">
  <a class="sr-only" href="#content">Skip to content</a>

  <div class="portal">
    <!-- ===== Top app bar ===== -->
    <header class="appbar">
      <div class="appbar__left">
        <a class="brand" href="index.html" aria-label="Huacheng Elite — back to main site">
          <span class="brand__mark" aria-hidden="true">
            <svg viewBox="0 0 100 112" fill="none"><g stroke="currentColor" stroke-width="4.5" stroke-linejoin="round"><polygon points="50,4 91,28 91,84 50,108 9,84 9,28"/><path d="M30 42 L50 54 L70 42 M30 58 L50 70 L70 58 M50 22 L50 90"/></g></svg>
          </span>
          <span class="brand__text">
            <span class="brand__name">Huacheng Elite</span>
            <span class="brand__cn">华承精锐</span>
          </span>
        </a>
      </div>

      <div class="appbar__right">
        <span class="credits-pill" id="creditsPill" title="Your credit balance"><span class="dia" aria-hidden="true">◆</span> 0 credits</span>
        <div class="appbar__who">
          <span class="appbar__who-name" id="whoName">Parent</span>
          <span class="appbar__who-sub" id="whoSub"></span>
        </div>
        <button class="btn btn--ghost btn--sm" data-action="logout">Log <span class="label">out</span></button>
      </div>
    </header>

    <!-- ===== Body: sidebar + content ===== -->
    <div class="portal__body">
      <!-- sidebar / bottom tab bar -->
      <nav class="sidebar" aria-label="Portal sections">
        <span class="sidebar__label">Menu</span>
        <button class="navitem" data-view="dashboard">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12l9-8 9 8M5 10v9h5v-6h4v6h5v-9"/></svg>
          <span class="label">Dashboard</span>
        </button>
        <button class="navitem" data-view="schedule">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4.5" width="18" height="16" rx="2.5"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></svg>
          <span class="label">Schedule</span>
        </button>
        <button class="navitem" data-view="bookings">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2a2 2 0 0 0 0 4v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2a2 2 0 0 0 0-4V7z"/></svg>
          <span class="label">Bookings</span>
          <span class="badge" id="bookingsBadge" style="display:none;">0</span>
        </button>
        <button class="navitem" data-view="credits">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7.5A2.5 2.5 0 0 1 5.5 5H18a2 2 0 0 1 2 2v0H5.5"/><path d="M3 7.5V18a2 2 0 0 0 2 2h14a1 1 0 0 0 1-1v-3M3 7.5V12"/><circle cx="17" cy="13" r="1.3" fill="currentColor" stroke="none"/></svg>
          <span class="label">Credits</span>
        </button>
        <button class="navitem" data-view="account">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-3.3 3.6-6 8-6s8 2.7 8 6"/></svg>
          <span class="label">Account</span>
        </button>

        <span class="sidebar__spacer"></span>
        <div class="sidebar__foot">
          <button class="navitem" data-action="logout">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 4h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-3M10 17l-5-5 5-5M5 12h11"/></svg>
            <span class="label">Log out</span>
          </button>
        </div>
      </nav>

      <!-- content: JS renders into each view -->
      <main class="content" id="content">
        <section class="view is-active" id="view-dashboard" aria-label="Dashboard"></section>
        <section class="view" id="view-schedule" aria-label="Schedule"></section>
        <section class="view" id="view-bookings" aria-label="My bookings"></section>
        <section class="view" id="view-credits" aria-label="Buy credits"></section>
        <section class="view" id="view-account" aria-label="Account"></section>
      </main>
    </div>
  </div>

  <!-- ===== Toast container ===== -->
  <div class="toast-wrap" id="toastWrap" aria-live="polite" aria-atomic="false"></div>

  <!-- ===== Reusable modal (PayNow / cancel notice / reset) ===== -->
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal__scrim" tabindex="-1"></div>
    <div class="modal__card" id="modalContent" role="document"></div>
  </div>

  <script src="mock-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
